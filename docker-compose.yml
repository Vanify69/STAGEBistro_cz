services:
  db:
    image: postgres:16-alpine
    ports:
      # 5433 avoids clash with a local PostgreSQL install often bound to :5432
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stagebistro
    volumes:
      - stagebistro_pg:/var/lib/postgresql/data

volumes:
  stagebistro_pg:
